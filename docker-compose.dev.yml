version: "3.8"

services:
  saga-db:
    image: mysql:8.0
    container_name: saga-db
    restart: always
    environment:
      MYSQL_DATABASE: bookstore_saga
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3312:3306"
    volumes:
      - saga_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network

  saga-orchestrator-service:
    build:
      context: .
      target: build
    container_name: saga-orchestrator-service
    ports:
      - "8092:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://saga-db:3306/bookstore_saga?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_RABBITMQ_HOST: rabbitmq
    networks:
      - bookstore-network
    depends_on:
      saga-db:
        condition: service_healthy

networks:
  bookstore-network:
    external: true

volumes:
  saga_mysql_data:

